<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#13151a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title id="pageTitle">Lente Viva — Painel</title>
<style>
:root{
  --bg:#13151a; --surface:#1b1e25; --surface-2:#22262f; --border:#2a2f3a;
  --text:#eceef2; --muted:#8a90a0; --accent:#3fd9c7; --accent-dim:#28504c;
  --warn:#f0a860; --danger:#e2685f; --ok:#6fcf7c; --radius:14px;
  --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
html{overscroll-behavior-y:none;}
body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior-y:none;}
button,input,select{font-family:inherit;}
button{cursor:pointer;touch-action:manipulation;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:8px;}

.shell{display:flex;height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
.brand svg{width:30px;height:30px;flex-shrink:0;}
.brand-text{font-family:var(--display);font-weight:600;font-size:15.5px;}
.brand-text small{display:block;font-family:var(--body);font-weight:400;font-size:10.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-top:2px;}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);background:none;border:none;font-size:13.5px;font-weight:500;text-align:left;width:100%;transition:background .15s,color .15s;}
.nav-item svg{width:18px;height:18px;opacity:.85;flex-shrink:0;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);}
.nav-badge{margin-left:auto;background:var(--surface-2);color:var(--muted);font-family:var(--mono);font-size:10.5px;padding:1px 6px;border-radius:20px;}
.nav-item.active .nav-badge{background:rgba(63,217,199,.18);color:var(--accent);}
.sidebar-foot{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:10px;}
.user-chip:hover{background:var(--surface-2);}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#2a8f83);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:12px;font-weight:700;color:#0d1a18;flex-shrink:0;}
.user-name{font-size:12.5px;font-weight:600;}
.user-role{font-size:10.5px;color:var(--muted);}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
.topbar h1{font-family:var(--display);font-size:18px;font-weight:600;}
.topbar-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative;color:var(--muted);}
.icon-btn:hover{color:var(--text);border-color:#3a4050;}
.icon-btn svg{width:16px;height:16px;}
.dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--warn);border:2px solid var(--surface);display:none;}

.content{flex:1;overflow-y:auto;padding:24px 28px 60px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
.view{display:none;animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.kpi-value{font-family:var(--mono);font-size:22px;font-weight:600;}
.kpi-value.pos{color:var(--ok);}
.kpi-value.warn{color:var(--warn);}
.kpi-delta{font-size:11px;color:var(--muted);margin-top:6px;}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
.card-title{font-family:var(--display);font-size:14px;font-weight:600;}
.card-link{font-size:11.5px;color:var(--accent);background:none;border:none;}
.card-link:hover{text-decoration:underline;}

.chart{height:150px;display:flex;align-items:flex-end;gap:8px;padding-top:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{width:100%;border-radius:5px 5px 0 0;background:var(--accent-dim);position:relative;overflow:hidden;min-height:2px;}
.bar::after{content:'';position:absolute;inset:0;background:var(--accent);opacity:.55;}
.bar-label{font-size:9.5px;color:var(--muted);}

.deadline-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;color:var(--text);}
.deadline-row:last-child{border-bottom:none;}
button.deadline-row:hover{background:var(--surface-2);}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.deadline-name{flex:1;}
.deadline-date{color:var(--muted);font-family:var(--mono);font-size:11px;}

.activity-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.activity-row:last-child{border-bottom:none;}
.activity-time{color:var(--muted);font-size:10.5px;white-space:nowrap;font-family:var(--mono);}

.empty-state{color:var(--muted);font-size:12px;padding:18px 4px;text-align:center;}

.quick-actions{display:flex;gap:10px;}
.qa-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;color:var(--text);font-size:12px;font-weight:500;}
.qa-btn:hover{border-color:var(--accent);color:var(--accent);}
.qa-btn svg{width:18px;height:18px;margin:0 auto 8px;display:block;}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;}
.tab-btn{padding:6px 14px;border-radius:8px;border:none;background:none;color:var(--muted);font-size:12.5px;font-weight:500;white-space:nowrap;}
.tab-btn.active{background:var(--accent-dim);color:var(--accent);}
.btn-primary{background:var(--accent);color:#0d1a18;border:none;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:600;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:600;}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12.5px;color:var(--text);width:220px;}
.search-input::placeholder{color:var(--muted);}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:0 14px 10px;font-weight:600;}
td{padding:12px 14px;font-size:12.5px;border-top:1px solid var(--border);}
tr{cursor:pointer;}
tr:hover td{background:var(--surface-2);}
.row-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.empty-row td{text-align:center;color:var(--muted);padding:24px;cursor:default;}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.pill.active{background:rgba(111,207,124,.15);color:var(--ok);}
.pill.inactive{background:rgba(138,144,160,.15);color:var(--muted);}
.pill.pending{background:rgba(240,168,96,.15);color:var(--warn);}
.pill.overdue{background:rgba(226,104,95,.15);color:var(--danger);}

.avatar-sm{width:24px;height:24px;border-radius:50%;background:var(--surface-2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);}
.mono{font-family:var(--mono);}
.progress-bar{width:70px;height:5px;background:var(--surface-2);border-radius:6px;overflow:hidden;display:inline-block;vertical-align:middle;}
.progress-fill{height:100%;background:var(--accent);}

.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;min-height:160px;transition:background .15s;}
.kanban-col.drag-over{background:var(--surface-2);border-color:var(--accent);}
.kanban-col h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;display:flex;justify-content:space-between;}
.kcard{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;cursor:grab;}
.kcard:active{cursor:grabbing;}
.kcard.dragging{opacity:.4;}
.kcard.done{opacity:.6;}
.kcard-title{font-weight:600;margin-bottom:6px;}
.kcard-meta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:10.5px;}
.prio{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;}
.kanban-empty{color:var(--muted);font-size:11px;text-align:center;padding:10px 0;}

.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center;}
.doc-card svg{width:26px;height:26px;color:var(--accent);margin-bottom:10px;}
.doc-name{font-size:11.5px;font-weight:500;margin-bottom:3px;word-break:break-word;}
.doc-meta{font-size:10px;color:var(--muted);}

.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:12.5px;}
.setting-desc{font-size:10.5px;color:var(--muted);margin-top:2px;}
.toggle{width:38px;height:22px;background:var(--surface-2);border-radius:20px;position:relative;border:1px solid var(--border);flex-shrink:0;}
.toggle.on{background:var(--accent-dim);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--muted);border-radius:50%;transition:.2s;}
.toggle.on::after{background:var(--accent);transform:translateX(16px);}

.notif-panel{position:absolute;top:52px;right:24px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.4);display:none;z-index:50;max-height:70vh;overflow-y:auto;}
.notif-panel.open{display:block;}
.notif-head{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;}
.notif-item{padding:11px 16px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:9px;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;color:var(--text);}
.notif-item:hover{background:var(--surface-2);}
.notif-item:last-child{border-bottom:none;}
.notif-item .prio{margin-top:4px;}

.modal-overlay{position:fixed;inset:0;background:rgba(8,9,12,.6);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-head h2{font-family:var(--display);font-size:15px;font-weight:600;}
.modal-close{background:var(--surface-2);border:none;color:var(--muted);width:28px;height:28px;border-radius:8px;font-size:16px;}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--text);color-scheme:dark;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.modal-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);}
.modal-foot .btn-primary,.modal-foot .btn-ghost{flex:1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:10px;font-size:12.5px;z-index:200;opacity:0;transition:.25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.client-detail{margin-top:16px;}

/* ---------------- CALENDAR ---------------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);display:flex;align-items:center;justify-content:center;}
.cal-title{font-family:var(--display);font-size:15px;font-weight:600;min-width:150px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center;padding-bottom:4px;letter-spacing:.4px;}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;min-height:64px;padding:6px;font-size:11px;position:relative;color:var(--text);}
.cal-cell.other-month{opacity:.3;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.selected{background:var(--accent-dim);border-color:var(--accent);}
.cal-daynum{font-family:var(--mono);font-size:11px;color:var(--muted);}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-day-list{margin-top:16px;}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:10.5px;color:var(--muted);}
.cal-legend span{display:inline-flex;align-items:center;gap:5px;}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:40;}
.bottom-nav-inner{display:flex;justify-content:space-around;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:9.5px;font-weight:500;padding:6px 4px;flex:1;position:relative;}
.bnav-item svg{width:19px;height:19px;}
.bnav-item.active{color:var(--accent);}
.bnav-dot{position:absolute;top:2px;right:22%;width:5px;height:5px;border-radius:50%;background:var(--warn);}

@media (max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .kanban{grid-template-columns:repeat(2,1fr);}
  .settings-grid{grid-template-columns:1fr;}
}
@media (max-width:640px){
  html,body{height:auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:auto;}
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .shell{display:block;height:auto;min-height:100vh;}
  .main{min-height:100vh;}
  .content{padding:16px 14px 90px;overflow-y:visible;-webkit-overflow-scrolling:auto;overscroll-behavior-y:auto;}
  .topbar{height:auto;padding:calc(10px + env(safe-area-inset-top)) 16px 12px;position:sticky;top:0;background:var(--bg);z-index:30;}
  .topbar h1{font-size:16px;}
  .topbar-sub{font-size:10.5px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .kpi{padding:13px 14px;}
  .kpi-value{font-size:18px;}
  .grid-2{grid-template-columns:1fr;gap:12px;margin-bottom:14px;}
  .card{padding:15px 16px;}
  .toolbar{flex-direction:column;align-items:stretch;gap:10px;}
  .toolbar .tabs{overflow-x:auto;}
  .toolbar>div{display:flex;gap:8px;}
  .search-input{width:auto;flex:1;}
  .row-card{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:560px;}
  .kanban{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:78%;overflow-x:auto;gap:10px;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .kanban-col{min-width:0;}
  .doc-grid{grid-template-columns:repeat(2,1fr);}
  .settings-grid{grid-template-columns:1fr;}
  .quick-actions{flex-wrap:wrap;}
  .qa-btn{flex:1 1 40%;}
  .notif-panel{right:14px;left:14px;width:auto;top:64px;}
  .card-head{flex-wrap:wrap;gap:8px;}
  .cal-cell{min-height:44px;font-size:9.5px;}
  .cal-title{min-width:auto;font-size:13px;}
  .field input,.field select,.search-input{font-size:16px;}
  .icon-btn{width:38px;height:38px;}
  .bnav-item{padding:8px 4px;min-height:44px;justify-content:center;}
  .tab-btn{padding:8px 14px;}
  .modal{max-height:calc(100vh - 40px);max-height:calc(100dvh - 40px);width:100%;max-width:none;border-radius:16px 16px 0 0;}
  .modal-overlay{padding:0;align-items:flex-end;}
}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="brand" id="sideBrand">
      <svg viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#3fd9c7" stroke-width="1.6"/>
        <path d="M20 4 L27 16 L20 20 Z" fill="#3fd9c7" opacity=".9"/>
        <path d="M36 20 L24 27 L20 20 Z" fill="#3fd9c7" opacity=".65"/>
        <path d="M20 36 L13 24 L20 20 Z" fill="#3fd9c7" opacity=".45"/>
        <path d="M4 20 L16 13 L20 20 Z" fill="#3fd9c7" opacity=".3"/>
        <circle cx="20" cy="20" r="4.5" fill="#0d1a18" stroke="#3fd9c7" stroke-width="1.2"/>
      </svg>
      <div class="brand-text">Lente Viva<small>Painel Interno</small></div>
    </div>
    <nav class="nav" id="sideNav"></nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar">T</div>
        <div><div class="user-name">Tomás</div><div class="user-role" id="sideUserRole">Fundador · Lente Viva</div></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="topTitle">Dashboard</h1>
        <div class="topbar-sub" id="topSub"></div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="toggleNotif(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="dot" id="notifDot"></span>
        </button>
      </div>
    </div>

    <div class="notif-panel" id="notifPanel"></div>

    <div class="content" id="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-financeiro"></div>
      <div class="view" id="view-clientes"></div>
      <div class="view" id="view-trabalho"></div>
      <div class="view" id="view-gestaoclientes"></div>
      <div class="view" id="view-analise"></div>
      <div class="view" id="view-definicoes"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav"><div class="bottom-nav-inner" id="bottomNav"></div></nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">Novo</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>

/* ---------------- STATE (tudo zerado, pronto para dados reais) ---------------- */
const DEFAULT_STATE = {
  currentView:'dashboard',
  finTab:'registos',
  trabTab:'kanban',
  gcTab:'rentabilidade',
  openClientId:null,
  openProfitClientId:null,

  tasks:[],
  docs:[],

};

const STORAGE_KEY = 'lenteviva_state_v6'; // v6: reset total de dados de teste
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      const merged = {...structuredClone(DEFAULT_STATE), ...parsed};
      merged.settings = {...structuredClone(DEFAULT_STATE.settings), ...(parsed.settings||{})};
      merged.settings.company = {...structuredClone(DEFAULT_STATE.settings.company), ...((parsed.settings||{}).company||{})};
      merged.sync = {...structuredClone(DEFAULT_STATE.sync), ...(parsed.sync||{})};
      return merged;
    }
  }catch(e){}
  return structuredClone(DEFAULT_STATE);
}
let state = loadState();
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    toast('Armazenamento cheio — este ficheiro pode ser grande demais para guardar localmente.');
  }
}
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function todayIso(){ return new Date().toISOString().slice(0,10); }
function logActivity(text){
  state.activity.unshift({time: nowLabel(), text});
  state.activity = state.activity.slice(0,12);
}
function nowLabel(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}
function formatBytes(bytes){
  if(bytes < 1024) return bytes+' B';
  if(bytes < 1024*1024) return Math.round(bytes/1024)+' KB';
  return (bytes/(1024*1024)).toFixed(1)+' MB';
}

/* ---------------- CUSTOS FIXOS ---------------- */
function nextDueDateForDay(day){
  const now = new Date(); now.setHours(0,0,0,0);
  const y = now.getFullYear(), m = now.getMonth();
  const lastDayThisMonth = new Date(y, m+1, 0).getDate();
  const clampedThis = Math.min(day, lastDayThisMonth);
  let candidate = new Date(y, m, clampedThis);
  if(candidate < now){
    const lastDayNext = new Date(y, m+2, 0).getDate();
    const clampedNext = Math.min(day, lastDayNext);
    candidate = new Date(y, m+1, clampedNext);
  }
  return candidate.toISOString().slice(0,10);
}
function daysUntil(iso){
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(iso+'T00:00:00');
  return Math.round((d-now)/86400000);
}
function monthKey(){
  const n = new Date();
  return n.getFullYear()+'-'+n.getMonth();
}
function monthKeyValue(key){
  const parts = String(key).split('-').map(Number);
  return parts[0]*12 + parts[1];
}
function nextMonthKey(){
  const n = new Date();
  const d = new Date(n.getFullYear(), n.getMonth()+1, 1);
  return d.getFullYear()+'-'+d.getMonth();
}
function daysInMonth(y,m){
  return new Date(y, m+1, 0).getDate();
}
function isEligibleThisMonth(c){
  return !c.startMonthKey || monthKeyValue(monthKey()) >= monthKeyValue(c.startMonthKey);
}
function firstEligibleDueDate(c){
  if(!c.startMonthKey || isEligibleThisMonth(c)) return nextDueDateForDay(c.dueDay);
  const [y,m] = c.startMonthKey.split('-').map(Number);
  const day = Math.min(c.dueDay, daysInMonth(y,m));
  return new Date(y, m, day).toISOString().slice(0,10);
}
function monthKeyLabel(key){
  if(!key) return '';
  const [y,m] = key.split('-').map(Number);
  return MONTHS[m]+' de '+y;
}
function checkFixedCostAlerts(){
  let changed = false;
  state.fixedCosts.filter(c=>c.active).forEach(c=>{
    const nextDate = firstEligibleDueDate(c);
    const dleft = daysUntil(nextDate);
    const notifId = 'fc-'+c.id+'-'+monthKey();
    const already = state.notifications.some(n=>n.id===notifId);
    if(dleft>=0 && dleft<=3 && !already){
      const newNotif = {
        id:notifId,
        color: dleft===0 ? 'var(--danger)' : 'var(--warn)',
        title: dleft===0 ? 'Custo fixo vence hoje' : 'Custo fixo em '+dleft+' dia(s)',
        body: c.name+' — '+c.value+'€',
        goto:'financeiro'
      };
      state.notifications.unshift(newNotif);
      fireSystemNotification(newNotif);
      changed = true;
    }
  });
  if(changed) saveState();
}
function checkRecurringRevenueAlerts(){
  let changed = false;
  state.recurringRevenues.filter(c=>c.active).forEach(c=>{
    const nextDate = firstEligibleDueDate(c);
    const dleft = daysUntil(nextDate);
    const notifId = 'mr-'+c.id+'-'+monthKey();
    const already = state.notifications.some(n=>n.id===notifId);
    if(dleft>=0 && dleft<=3 && !already){
      const newNotif = {
        id:notifId,
        color: dleft===0 ? 'var(--accent)' : 'var(--ok)',
        title: dleft===0 ? 'Mensalidade prevista para hoje' : 'Mensalidade em '+dleft+' dia(s)',
        body: (c.client?c.client+' — ':'')+c.name+' — '+c.value+'€',
        goto:'financeiro'
      };
      state.notifications.unshift(newNotif);
      fireSystemNotification(newNotif);
      changed = true;
    }
  });
  if(changed) saveState();
}
function isFixedCostConfirmed(c){
  return !!(c.paidMonths && c.paidMonths[monthKey()]);
}
function fixedCostsCommittedTotal(){
  return state.fixedCosts.filter(c=>c.active && isEligibleThisMonth(c)).reduce((s,c)=>s+c.value,0);
}
function fixedCostsMonthlyTotal(){
  return state.fixedCosts.filter(c=>c.active && isEligibleThisMonth(c) && isFixedCostConfirmed(c)).reduce((s,c)=>s+c.value,0);
}
function isRecurringRevenueConfirmed(c){
  return !!(c.paidMonths && c.paidMonths[monthKey()]);
}
function recurringRevenueCommittedTotal(){
  return state.recurringRevenues.filter(c=>c.active && isEligibleThisMonth(c)).reduce((s,c)=>s+c.value,0);
}
function recurringRevenueMonthlyTotal(){
  return state.recurringRevenues.filter(c=>c.active && isEligibleThisMonth(c) && isRecurringRevenueConfirmed(c)).reduce((s,c)=>s+c.value,0);
}
function clientRecurringRevenueTotal(clientName){
  return state.recurringRevenues.filter(c=>c.client===clientName).reduce((s,c)=>{
    const confirmedMonths = Object.values(c.paidMonths||{}).filter(Boolean).length;
    return s + (c.value * confirmedMonths);
  }, 0);
}

/* ---------------- shared: upcoming items (tasks + events + custos fixos) ---------------- */
function getUpcoming(limit){
  const items = [];
  state.tasks.filter(t=>t.status!=='done' && t.due).forEach(t=>{
    items.push({date:t.due, name:t.title, color:PRIO_COLOR[t.priority]||'var(--muted)', goto:'trabalho'});
  });
  state.events.forEach(ev=>{
    items.push({date:ev.date, name:ev.title, color:EVENT_TYPES[ev.type]?.color||'var(--muted)', goto:'trabalho'});
  });
  state.fixedCosts.filter(c=>c.active).forEach(c=>{
    items.push({date:nextDueDateForDay(c.dueDay), name:c.name+' (custo fixo)', color:'var(--warn)', goto:'financeiro'});
  });
  items.sort((a,b)=> (a.date||'9999').localeCompare(b.date||'9999'));
  return items.slice(0, limit||6);
}
function formatShort(iso){
  if(!iso) return 'sem data';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d-today)/86400000);
  if(diff===0) return 'hoje';
  if(diff<0) return 'atrasado';
  return String(d.getDate()).padStart(2,'0')+' '+meses[d.getMonth()];
}

/* ---------------- DASHBOARD ---------------- */
function computeKpis(){
  const receitasMes = state.movements.filter(isRealizedReceita).reduce((s,m)=>s+m.value,0) + recurringRevenueMonthlyTotal();
  const depositosMes = state.movements.filter(m=>m.type==='deposito' && m.status!=='Cancelado').reduce((s,m)=>s+m.value,0);
  const despesasMes = state.movements.filter(m=>m.type==='despesa' && m.status!=='Cancelado').reduce((s,m)=>s+m.value,0) + fixedCostsMonthlyTotal();
  const saldo = receitasMes + depositosMes - despesasMes;
  const iva = Math.max(0, Math.round(receitasMes*0.23 - despesasMes*0.23));
  const pendentesEntrada = pendingIncomingMovements();
  const pendentesEntradaTotal = pendentesEntrada.reduce((s,m)=>s+m.value,0);
  return {receitasMes,despesasMes,saldo,iva,depositosMes,pendentesEntradaTotal,pendentesEntradaCount:pendentesEntrada.length};
}
function renderDashboard(){
  const k = computeKpis();
  const upcoming = getUpcoming(5);
  document.getElementById('view-dashboard').innerHTML = `

      <div class="kpi"><div class="kpi-label">Mensalidades fixas</div><div class="kpi-value pos">${recurringRevenueMonthlyTotal().toLocaleString('pt-PT')}€ <span style="font-size:11px;color:var(--muted);font-weight:400;">recebidas este mês</span></div><div class="kpi-delta">Esperado no geral: ${recurringRevenueCommittedTotal().toLocaleString('pt-PT')}€/mês · ${state.recurringRevenues.filter(c=>c.active).length} ativa(s) · <button class="card-link" style="font-size:11px;" onclick="goToView('financeiro');setFinTab('mensalidades')">gerir →</button></div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;">Este mês, até agora</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Receitas do mês</div><div class="kpi-value pos">${k.receitasMes.toLocaleString('pt-PT')}€</div><div class="kpi-delta">${state.movements.filter(isRealizedReceita).length} registo(s) faturável(eis) e pago(s) + mensalidades recebidas</div></div>
      <div class="kpi"><div class="kpi-label">Custos do mês</div><div class="kpi-value">${k.despesasMes.toLocaleString('pt-PT')}€</div><div class="kpi-delta">${state.movements.filter(m=>m.type==='despesa'&&m.status!=='Cancelado').length} registo(s) + custos fixos saídos</div></div>

      <div class="kpi"><div class="kpi-label">IVA estimado</div><div class="kpi-value warn">${k.iva}€</div><div class="kpi-delta">Sobre receitas faturáveis (23%)</div></div>

function renderMiniChart(){
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({y:d.getFullYear(), m:d.getMonth(), label:MONTHS[d.getMonth()].slice(0,3)});
  }
  const totals = months.map(mo=>{
    const base = state.movements.filter(mv=>{
      const d = new Date(mv.date+'T00:00:00');
      return d.getFullYear()===mo.y && d.getMonth()===mo.m && isRealizedReceita(mv);
    }).reduce((s,mv)=>s+mv.value,0);
    const isCurrent = mo.y===now.getFullYear() && mo.m===now.getMonth();
    return isCurrent ? base + recurringRevenueMonthlyTotal() : base;
  });
  const max = Math.max(...totals, 1);
  return months.map((mo,i)=>`<div class="bar-col"><div class="bar" style="height:${Math.max(4,(totals[i]/max)*100)}%"></div><div class="bar-label">${mo.label}</div></div>`).join('');
}

function toggleFixedCostConfirmed(id){
  const c = state.fixedCosts.find(x=>x.id===id);
  if(!c || !isEligibleThisMonth(c)) return;
  if(!c.paidMonths) c.paidMonths = {};
  const key = monthKey();
  c.paidMonths[key] = !c.paidMonths[key];
  logActivity((c.paidMonths[key]?'Confirmada saída do custo fixo: ':'Desmarcada saída do custo fixo: ')+c.name);
  saveState();
  toast(c.paidMonths[key] ? 'Marcado como já saído da conta' : 'Marcado como ainda não saído');
  renderCustosTable(); refreshFinancialViews();
}

function renderFinTable(){
  const q = (document.getElementById('finSearch')?.value || '').toLowerCase();
  const rows = state.movements.filter(m=> m.desc.toLowerCase().includes(q) || m.client.toLowerCase().includes(q) || m.cat.toLowerCase().includes(q));
  const tbody = document.getElementById('finTbody');
  if(!tbody) return;
  if(rows.length===0){ tbody.innerHTML = `<tr class="empty-row"><td colspan="8">${state.movements.length===0 ? 'Ainda sem movimentos. Cria o primeiro com "+ Novo movimento".' : 'Nenhum movimento encontrado.'}</td></tr>`; return; }
  tbody.innerHTML = rows.map(m=>{
    const typeLabel = m.type==='receita' ? 'Receita' : m.type==='deposito' ? 'Depósito' : 'Despesa';
    const valueColor = m.type==='despesa' ? 'var(--danger)' : m.type==='deposito' ? 'var(--accent)' : 'var(--ok)';
    const sign = m.type==='despesa' ? '-' : '+';
    const cancelled = m.status==='Cancelado';
    const statusPill = cancelled
      ? `<span class="pill" style="opacity:.6;">Cancelado</span>`
      : `<span class="pill ${m.status==='Pago'?'active':'pending'}" style="cursor:pointer;" onclick="toggleMovementStatus('${m.id}')">${m.status}</span>`;
    return `
    <tr>
      <td class="mono">${formatShort(m.date)}</td>
      <td${cancelled?' style="opacity:.5;text-decoration:line-through;"':''}>${m.desc}</td>
      <td${cancelled?' style="opacity:.5;"':''}>${m.cat}</td>
      <td${cancelled?' style="opacity:.5;"':''}>${m.client}</td>
      <td${cancelled?' style="opacity:.5;"':''}>${typeLabel}</td>
      <td class="mono" style="color:${valueColor};${cancelled?'opacity:.5;text-decoration:line-through;':''}">${sign}${m.value}€</td>
      <td>${statusPill}</td>
      <td style="white-space:nowrap;">
        <button class="btn-ghost" style="padding:4px 8px;font-size:11px;" onclick="openModal('editar-movimento','${m.id}')">Editar</button>
        ${cancelled
          ? `<button class="btn-ghost" style="padding:4px 8px;font-size:11px;" onclick="reactivateMovement('${m.id}')">Reativar</button>`
          : `<button class="btn-ghost" style="padding:4px 8px;font-size:11px;" onclick="cancelMovement('${m.id}')">Cancelar</button>`}
        <button class="btn-ghost" style="padding:4px 8px;font-size:11px;color:var(--danger);" onclick="deleteMovement('${m.id}')">Apagar</button>
      </td>
    </tr>`;
  }).join('');
}
function toggleMovementStatus(id){
  const m = state.movements.find(x=>x.id===id);
  if(!m || m.status==='Cancelado') return;
  m.status = m.status==='Pago' ? 'Pendente' : 'Pago';
  logActivity((m.status==='Pago'?'Marcado como pago: ':'Marcado como pendente: ')+m.desc);
  saveState();
  toast(m.status==='Pago' ? 'Marcado como pago' : 'Marcado como pendente');
  renderFinTable(); refreshFinancialViews();

function cancelMovement(id){
  const m = state.movements.find(x=>x.id===id);
  if(!m) return;
  if(!confirm('Cancelar o movimento "'+m.desc+'"? Deixa de contar para o saldo e para a faturação, mas fica registado no histórico.')) return;
  m.status = 'Cancelado';
  logActivity('Movimento cancelado: '+m.desc);
  saveState();
  toast('Movimento cancelado');
  renderFinTable(); refreshFinancialViews();
}
function reactivateMovement(id){
  const m = state.movements.find(x=>x.id===id);
  if(!m) return;
  m.status = 'Pendente';
  logActivity('Movimento reativado: '+m.desc);
  saveState();
  toast('Movimento reativado como pendente');
  renderFinTable(); refreshFinancialViews();
}
function deleteMovement(id){
  const m = state.movements.find(x=>x.id===id);
  if(!m) return;
  if(!confirm('Apagar definitivamente o movimento "'+m.desc+'"? Esta ação não pode ser desfeita.')) return;
  state.movements = state.movements.filter(x=>x.id!==id);
  logActivity('Movimento apagado: '+m.desc);

  toast('Movimento apagado');
  renderFinTable(); refreshFinancialViews();
}

/* ---------------- CALENDÁRIO (real, ligado a tarefas e eventos) ---------------- */
function calItemsForDate(iso){
  const items = [];
  const [y,m,d] = iso.split('-').map(Number);
  state.tasks.filter(t=>t.due===iso).forEach(t=> items.push({title:t.title, color:PRIO_COLOR[t.priority]||'var(--muted)', kind:'Tarefa'}));
  state.events.filter(e=>e.date===iso).forEach(e=> items.push({title:e.title, color:EVENT_TYPES[e.type]?.color||'var(--muted)', kind:EVENT_TYPES[e.type]?.label||'Evento'}));
  state.fixedCosts.filter(c=>c.active && c.dueDay===d).forEach(c=> items.push({title:c.name+' — '+c.value+'€', color:'var(--warn)', kind:'Custo fixo'}));
  return items;
}
function calChangeMonth(delta){
  let m = state.calMonth + delta, y = state.calYear;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  state.calMonth=m; state.calYear=y; saveState();
  renderCalendar();
}
function calSelectDate(iso){
  state.calSelectedDate = state.calSelectedDate===iso ? null : iso;
  saveState();
  renderCalendar();
}
function renderCalendar(){
  const card = document.getElementById('calendarCard');
  if(!card) return;
  const y = state.calYear, m = state.calMonth;
  const first = new Date(y,m,1);
  const startDow = (first.getDay()+6)%7; // Monday=0
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrevMonth = new Date(y,m,0).getDate();
  const todayIsoStr = todayIso();

  let cells = '';
  for(let i=0;i<startDow;i++){
    const dayNum = daysInPrevMonth - startDow + 1 + i;
    cells += `<div class="cal-cell other-month"><div class="cal-daynum">${dayNum}</div></div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items = calItemsForDate(iso);
    const isToday = iso===todayIsoStr;
    const isSelected = iso===state.calSelectedDate;
    cells += `<div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" onclick="calSelectDate('${iso}')" style="cursor:pointer;">
      <div class="cal-daynum">${d}</div>
      <div class="cal-dots">${items.slice(0,4).map(it=>`<span class="cal-dot" style="background:${it.color}"></span>`).join('')}</div>
    </div>`;
  }
  const totalCells = startDow + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let i=1;i<=trailing;i++){
    cells += `<div class="cal-cell other-month"><div class="cal-daynum">${i}</div></div>`;
  }

  const selectedItems = state.calSelectedDate ? calItemsForDate(state.calSelectedDate) : [];

  card.innerHTML = `
    <div class="cal-head">
      <div class="card-title">${MONTHS[m]} ${y}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calChangeMonth(-1)">${ICONS.chevL}</button>
        <button class="btn-ghost" style="padding:5px 10px;font-size:11px;" onclick="calGoToday()">Hoje</button>
        <button class="cal-nav-btn" onclick="calChangeMonth(1)">${ICONS.chevR}</button>
      </div>
    </div>
    <div class="cal-grid">
      ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      ${Object.entries(EVENT_TYPES).map(([k,v])=>`<span><span class="cal-dot" style="background:${v.color}"></span>${v.label}</span>`).join('')}
    </div>
    <div class="cal-day-list">
      ${state.calSelectedDate ? `
        <div class="card-title" style="margin-bottom:8px;font-size:12.5px;">${new Date(state.calSelectedDate+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'long'})}</div>
        ${selectedItems.length ? selectedItems.map(it=>`<div class="deadline-row"><span class="tag-dot" style="background:${it.color}"></span><span class="deadline-name">${it.title}</span><span class="deadline-date">${it.kind}</span></div>`).join('') : `<div class="empty-state">Sem tarefas ou eventos neste dia.</div>`}
      ` : `<div class="empty-state">Seleciona um dia para veres os detalhes.</div>`}
    </div>`;
}
function calGoToday(){
  const n = new Date();
  state.calMonth = n.getMonth(); state.calYear = n.getFullYear(); state.calSelectedDate = todayIso();
  saveState(); renderCalendar();
}

/* ---------------- GESTÃO CLIENTES (custo de aquisição, custos associados e faturação por cliente) ---------------- */
function setGcTab(tab){ state.gcTab = tab; saveState(); renderGestaoClientes(); }
function clientFixedCostsTotal(clientName){
  return state.fixedCosts.filter(c=>c.client===clientName).reduce((s,c)=>{
    const confirmedMonths = Object.values(c.paidMonths||{}).filter(Boolean).length;
    return s + (c.value * confirmedMonths);
  }, 0);
}
function clientCostsTotal(clientName){
  const movementCosts = state.movements.filter(m=>m.client===clientName && m.type==='despesa' && m.status!=='Cancelado').reduce((s,m)=>s+m.value,0);
  return movementCosts + clientFixedCostsTotal(clientName);
}
function clientProfitData(c){
  const totalFaturado = billedTotal(c.name);
  const custosAssociados = clientCostsTotal(c.name);
  const acquisitionCost = c.acquisitionCost || 0;
  const custoTotal = custosAssociados + acquisitionCost;
  const margem = totalFaturado - custoTotal;
  const roi = custoTotal>0 ? Math.round((margem/custoTotal)*100) : (totalFaturado>0 ? 100 : 0);
  const monthsActive = clientActiveMonths(c.name);
  const avgMonthlyMargem = monthsActive>0 ? (totalFaturado-custosAssociados)/monthsActive : 0;
  const paybackMeses = acquisitionCost>0 && avgMonthlyMargem>0 ? Math.ceil(acquisitionCost/avgMonthlyMargem) : null;
  return {client:c, totalFaturado, custosAssociados, acquisitionCost, custoTotal, margem, roi, paybackMeses};
}
function clientActiveMonths(clientName){
  const dates = state.movements.filter(m=>m.client===clientName && m.status!=='Cancelado').map(m=>m.date).filter(Boolean);
  if(dates.length===0) return 0;
  const keys = new Set(dates.map(d=>d.slice(0,7)));
  return keys.size;
}
function computeAllClientProfits(){
  return state.clients.map(clientProfitData).sort((a,b)=>b.margem-a.margem);
}
function negativeMarginClientsCount(){
  return computeAllClientProfits().filter(p=>p.margem<0 && (p.totalFaturado>0 || p.custoTotal>0)).length;
}

/* ---------------- ANÁLISE DA EMPRESA ---------------- */
function computeMonthlySeries(n){
  const now = new Date();
  const arr = [];
  for(let i=n-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const y=d.getFullYear(), m=d.getMonth();
    const receita = state.movements.filter(mv=>{const dd=new Date(mv.date+'T00:00:00');return dd.getFullYear()===y&&dd.getMonth()===m&&isRealizedReceita(mv);}).reduce((s,mv)=>s+mv.value,0);
    let despesa = state.movements.filter(mv=>{const dd=new Date(mv.date+'T00:00:00');return dd.getFullYear()===y&&dd.getMonth()===m&&mv.type==='despesa'&&mv.status!=='Cancelado';}).reduce((s,mv)=>s+mv.value,0);
    const isCurrent = y===now.getFullYear() && m===now.getMonth();
    let receitaTotal = receita;
    if(isCurrent){ despesa += fixedCostsMonthlyTotal(); receitaTotal += recurringRevenueMonthlyTotal(); }
    arr.push({label:MONTHS[m].slice(0,3), y, m, receita:receitaTotal, despesa, lucro:receitaTotal-despesa});
  }
  return arr;
}
function forecastNextMonth(series){
  const vals = series.map(s=>s.receita);
  const n = vals.length;
  if(n<2) return null;
  let sumX=0,sumY=0,sumXY=0,sumXX=0;
  vals.forEach((y,x)=>{ sumX+=x; sumY+=y; sumXY+=x*y; sumXX+=x*x; });
  const denom = (n*sumXX - sumX*sumX);
  if(denom===0) return Math.round(sumY/n);
  const slope = (n*sumXY - sumX*sumY)/denom;
  const intercept = (sumY - slope*sumX)/n;
  const next = slope*n + intercept;
  return Math.max(0, Math.round(next));
}
function generateSuggestions(m){
  const tips = [];
  const push = (level, title, text) => tips.push({level, title, text});

  if(state.movements.length===0){
    push('info','Regista os teus primeiros movimentos','Ainda não há receitas nem despesas registadas. Assim que começares a registar, esta secção passa a dar-te sugestões baseadas nos teus números reais.');
  }

  if(m.cur.lucro < 0 && state.movements.length>0){
    push('danger','Este mês está no vermelho','As despesas (incluindo custos fixos) ultrapassam a receita. Vale a pena rever se há despesas a cortar ou faturas por cobrar em atraso.');
  }

  if(m.pctChange <= -15 && m.prev.receita>0){
    push('warn','Receita a cair vs mês anterior','A receita caiu '+Math.abs(m.pctChange)+'% face ao mês passado. Convém perceber se foi sazonal, se algum cliente reduziu o serviço, ou se há faturas por emitir.');
  } else if(m.pctChange >= 20 && m.prev.receita>0){
    push('ok','Crescimento saudável','A receita cresceu '+m.pctChange+'% vs o mês anterior. Boa altura para rever se a capacidade da equipa acompanha este crescimento.');
  }

  if(m.concentracao > 50 && m.topClientEntry){
    push('warn','Elevada dependência de um único cliente','"'+m.topClientEntry[0]+'" representa '+m.concentracao+'% da tua receita. Se este cliente saísse, o impacto seria grande — vale a pena diversificar a carteira de clientes.');
  }

  if(m.overhead > 30){
    push('warn','Custos fixos pesam bastante na receita','Os custos fixos representam '+m.overhead+'% da receita deste mês. Revê se todas as subscrições e custos recorrentes ainda fazem sentido.');
  }

  if(pendingMovements() > 0){
    push('warn','Tens '+pendingMovements()+' movimento(s) por regularizar','Há receitas ou despesas ainda marcadas como "Pendente" em Financeiro. Marca-as como pagas assim que estiverem regularizadas, para os números refletirem a realidade.');
  }

  if(state.fixedCosts.length===0 && state.movements.filter(x=>x.type==='despesa').length>2){
    push('info','Regista os teus custos recorrentes como custos fixos','Já tens despesas registadas mas nenhum custo fixo definido. Marcar rendas, subscrições e seguros como custo fixo dá-te alertas automáticos e uma previsão mensal mais fiável.');
  }

  if(m.catRanked.length>0){
    const [topCat, topVal] = m.catRanked[0];
    const totalDespesa = m.catRanked.reduce((s,[,v])=>s+v,0);
    const share = totalDespesa>0 ? Math.round((topVal/totalDespesa)*100) : 0;
    if(share > 40){
      push('info','Uma categoria domina as despesas','"'+topCat+'" representa '+share+'% do total de despesas. Vale a pena confirmar se este valor é o esperado ou se há espaço para negociar/otimizar.');
    }
  }

  if(m.taskRate < 40 && state.tasks.length >= 4){
    push('warn','Taxa de conclusão de tarefas baixa','Só '+m.taskRate+'% das tarefas registadas estão concluídas. Se o volume de trabalho estiver a acumular-se, pode valer a pena rever prioridades ou capacidade.');
  }

  if(state.clients.length>0 && state.clients.length<3){
    push('info','Base de clientes ainda pequena','Tens '+state.clients.length+' cliente(s) ativo(s). Continuar a prospecção é importante para reduzir o risco de dependência e estabilizar a receita.');
  }

  const profits = computeAllClientProfits();
  const negativeClients = profits.filter(p=>p.margem<0 && (p.totalFaturado>0 || p.custoTotal>0));
  if(negativeClients.length>0){
    const names = negativeClients.slice(0,3).map(p=>p.client.name).join(', ');
    push('danger','Cliente(s) com margem negativa','"'+names+'" '+(negativeClients.length>1?'estão':'está')+' a custar mais do que faturam (custo de aquisição + custos associados). Revê preços, âmbito de trabalho ou vale a pena continuar a servir este(s) cliente(s).');
  }
  const slowPayback = profits.filter(p=>p.paybackMeses!==null && p.paybackMeses>12);
  if(slowPayback.length>0){
    push('warn','Custo de aquisição a demorar a compensar','"'+slowPayback[0].client.name+'" demora cerca de '+slowPayback[0].paybackMeses+' meses a recuperar o custo de aquisição, ao ritmo atual. Considera acelerar a rentabilização ou rever o custo de aquisição para clientes semelhantes.');
  }
  const bestClient = profits[0];
  if(bestClient && bestClient.margem>0 && profits.length>1){
    push('ok','Cliente mais rentável identificado','"'+bestClient.client.name+'" é atualmente o cliente com maior margem líquida ('+bestClient.margem.toLocaleString('pt-PT')+'€). Vale a pena perceber o que torna esta relação rentável e replicar em novos clientes.');
  }

  if(m.forecast!==null && m.cur.receita>0){
    const diff = Math.round(((m.forecast-m.cur.receita)/Math.max(m.cur.receita,1))*100);
    if(diff<=-10){
      push('warn','Previsão aponta para queda de receita','Com base na tendência dos últimos meses, o próximo mês pode ficar perto de '+m.forecast.toLocaleString('pt-PT')+'€ de receita, abaixo do mês atual. Vale a pena reforçar a prospecção agora.');
    } else if(diff>=10){
      push('ok','Previsão aponta para crescimento','Com base na tendência recente, o próximo mês pode aproximar-se de '+m.forecast.toLocaleString('pt-PT')+'€ de receita. Continua a manter o ritmo atual de entregas e faturação.');
    }
  }

  if(tips.length===0){
    push('ok','Sem alertas relevantes por agora','Os números estão equilibrados com base no que está registado. Continua a manter os registos atualizados para sugestões cada vez mais precisas.');
  }

  const order = {danger:0, warn:1, info:2, ok:3};
  return tips.sort((a,b)=>order[a.level]-order[b.level]).slice(0,8);
}

function renderAnalise(){
  const series = computeMonthlySeries(6);
  const maxAbs = Math.max(...series.map(s=>Math.abs(s.lucro)),1);
  const forecast = forecastNextMonth(series);

  const catTotals = {};
  state.movements.filter(m=>m.type==='despesa' && m.status!=='Cancelado').forEach(m=>{ catTotals[m.cat]=(catTotals[m.cat]||0)+m.value; });
  state.fixedCosts.filter(c=>c.active && isFixedCostConfirmed(c)).forEach(c=>{ catTotals[c.category]=(catTotals[c.category]||0)+c.value; });
  const catRanked = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catMax = Math.max(...catRanked.map(([,v])=>v),1);

  const cur = series[series.length-1];
  const prev = series[series.length-2] || {receita:0,despesa:0,lucro:0};
  const pctChange = prev.receita>0 ? Math.round(((cur.receita-prev.receita)/prev.receita)*100) : (cur.receita>0?100:0);

  const clientTotals = {};
  state.movements.filter(isRealizedReceita).forEach(m=>{ clientTotals[m.client]=(clientTotals[m.client]||0)+m.value; });

  const topClientEntry = Object.entries(clientTotals).sort((a,b)=>b[1]-a[1])[0];
  const concentracao = topClientEntry && totalReceita>0 ? Math.round((topClientEntry[1]/totalReceita)*100) : 0;

  const totalTasks = state.tasks.length;
  const doneTasks = state.tasks.filter(t=>t.status==='done').length;

  const overhead = cur.receita>0 ? Math.round((fixedCostsMonthlyTotal()/cur.receita)*100) : (fixedCostsMonthlyTotal()>0?100:0);

/* ---------------- CHAVE DE SINCRONIZAÇÃO ---------------- */
const SYNC_VALID_MS = 4*60*60*1000; // 4 horas
const SYNC_PREFIX = 'LV1-';
function encodeSyncKey(ts){
  const payload = {v:1, ts, data:state};
  const json = JSON.stringify(payload);
  return SYNC_PREFIX + btoa(unescape(encodeURIComponent(json)));
}
function decodeSyncKey(code){
  const clean = code.trim();
  const stripped = clean.startsWith(SYNC_PREFIX) ? clean.slice(SYNC_PREFIX.length) : clean;
  const json = decodeURIComponent(escape(atob(stripped)));
  const payload = JSON.parse(json);
  if(!payload || payload.v!==1 || !payload.data || !payload.ts) throw new Error('formato inválido');
  return payload;
}
function currentSyncKey(){
  if(!state.sync.generatedAt || (Date.now()-state.sync.generatedAt) > SYNC_VALID_MS){
    state.sync.generatedAt = Date.now();
    saveState();
  }
  return encodeSyncKey(state.sync.generatedAt);
}
function regenerateSyncKey(){
  state.sync.generatedAt = Date.now();
  saveState();
  renderDefinicoes();
  toast('Nova chave gerada');
}
function copySyncKey(){
  const el = document.getElementById('syncKeyBox');
  if(!el) return;
  el.select();
  el.setSelectionRange(0, 999999);
  try{
    navigator.clipboard.writeText(el.value);
    toast('Chave copiada');
  }catch(e){
    document.execCommand('copy');
    toast('Chave copiada');
  }
}
function importSyncKey(){
  const input = document.getElementById('syncKeyInput');
  if(!input || !input.value.trim()){ toast('Cola primeiro a chave'); return; }
  let payload;
  try{
    payload = decodeSyncKey(input.value);
  }catch(e){
    toast('Chave inválida — confirma que a copiaste por inteiro');
    return;
  }
  if((Date.now()-payload.ts) > SYNC_VALID_MS){
    toast('Esta chave expirou (validade de 4 horas) — pede uma chave atual no outro dispositivo');
    return;
  }
  if(!confirm('Isto substitui todos os dados guardados neste dispositivo pelos dados da chave. Continuar?')) return;
  state = payload.data;
  state.sync = state.sync || {generatedAt: Date.now()};
  saveState();
  renderAll();
  toast('Dados atualizados a partir da chave');
}
setInterval(()=>{
  if(!state.sync.generatedAt || (Date.now()-state.sync.generatedAt) > SYNC_VALID_MS){
    state.sync.generatedAt = Date.now();
    saveState();
    if(state.currentView==='definicoes') renderDefinicoes();
  }
}, 15*60*1000);

        if(c){ c.projects.push({name:pname,pct:0}); c.project=pname; }
        logActivity('Novo projeto "'+pname+'" para '+clientName);
        saveState(); closeModal(); goToView('clientes'); if(c) openClient(c.id); toast('Projeto adicionado a '+clientName);
      };
    }
  }

  if(type==='documento'){
    title.textContent = 'Carregar ficheiro';
    body.innerHTML = `
      <div class="field"><label>Ficheiro</label><input id="f-docfile" type="file"></div>
      <div class="field"><label>Nome do documento</label><input id="f-docname" placeholder="Ex: Contrato Cliente X"></div>
      <div class="field"><label>Cliente associado</label><select id="f-docclient"><option value="">—</option>${state.clients.map(c=>`<option value="${c.id}" ${clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="field"><label>Associar a</label><select id="f-doctag"><option ${clientId?'selected':''} value="Cliente">Cliente</option><option value="Projeto">Projeto</option><option value="Financeiro">Financeiro</option></select></div>
      <div id="f-docprogress" style="font-size:11px;color:var(--muted);"></div>`;
    const fileInput = ()=>document.getElementById('f-docfile');
    const fi = fileInput();
    if(fi){
      fi.addEventListener('change', ()=>{
        const f = fileInput().files[0];
        const nameField = document.getElementById('f-docname');
        if(f && nameField && !nameField.value){
          nameField.value = f.name.replace(/\.[^.]+$/,'');
        }
      });
    }
    submit.onclick = async ()=>{
      const n=document.getElementById('f-docname').value.trim();
      const f = fileInput().files[0];
      const selectedClientId = document.getElementById('f-docclient').value || null;
      if(!n){ toast('Preenche o nome do documento'); return; }
      if(!f){ toast('Escolhe um ficheiro para carregar'); return; }
      if(f.size > 4*1024*1024){ toast('Ficheiro demasiado grande (máx. ~4MB neste protótipo)'); return; }
      document.getElementById('f-docprogress').textContent = 'A carregar...';
      try{
        const dataUrl = await fileToDataUrl(f);
        const ext = (f.name.split('.').pop()||'').toUpperCase();
        state.docs.unshift({id:uid('d'),name:n,tag:document.getElementById('f-doctag').value,type:ext||'FICHEIRO',size:formatBytes(f.size),data:dataUrl,thumb:dataUrl.startsWith('data:image')?dataUrl:null,clientId:selectedClientId});
        logActivity('Documento carregado: '+n);
        saveState();
        closeModal();
        if(clientId && state.currentView==='clientes'){ openClient(clientId); } else { goToView('gestaoclientes'); setGcTab('documentos'); }
        toast('Documento carregado');
      }catch(e){
        toast('Erro ao carregar o ficheiro');
      }
    };
  }

  if(type==='evento'){
    title.textContent = 'Novo evento no calendário';
    body.innerHTML = `
      <div class="field"><label>Título</label><input id="f-etitle" placeholder="Ex: Reunião com cliente"></div>
      <div class="field"><label>Data</label><input id="f-edate" type="date" value="${state.calSelectedDate||todayIso()}"></div>
      <div class="field"><label>Tipo</label><select id="f-etype">${Object.entries(EVENT_TYPES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select></div>`;
    submit.onclick = ()=>{
      const t=document.getElementById('f-etitle').value.trim();
      const d=document.getElementById('f-edate').value;
      if(!t||!d){ toast('Preenche o título e a data'); return; }
      state.events.push({id:uid('e'),title:t,date:d,type:document.getElementById('f-etype').value});
      logActivity('Novo evento: '+t);
      state.calSelectedDate = d;
      const dd = new Date(d+'T00:00:00');
      state.calMonth = dd.getMonth(); state.calYear = dd.getFullYear();
      saveState(); closeModal(); goToView('trabalho'); setTrabTab('calendario'); toast('Evento adicionado ao calendário');
    };
  }

  if(type==='empresa'){
    const c = state.settings.company || {};
    title.textContent = 'Editar informações da empresa';
    body.innerHTML = `
      <div class="field"><label>Logótipo</label><input id="f-clogo" type="file" accept="image/*"></div>
      <div id="f-clogo-preview" style="${c.logo?'':'display:none'}"><img src="${c.logo||''}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;"></div>
      <div class="field"><label>Nome da empresa</label><input id="f-cname" placeholder="Ex: Lente Viva" value="${c.name||''}"></div>
      <div class="field"><label>NIF</label><input id="f-cnif" placeholder="5xx xxx xxx" value="${c.nif||''}"></div>`;
    let pendingLogo = c.logo || null;
    const logoInput = document.getElementById('f-clogo');
    logoInput.addEventListener('change', async ()=>{
      const f = logoInput.files[0];
      if(!f) return;
      if(f.size > 2*1024*1024){ toast('Imagem demasiado grande (máx. ~2MB)'); return; }
      try{
        pendingLogo = await fileToDataUrl(f);
        const prev = document.getElementById('f-clogo-preview');
        prev.style.display = 'block';
        prev.innerHTML = `<img src="${pendingLogo}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;">`;
      }catch(e){ toast('Erro ao carregar a imagem'); }
    });
    submit.onclick = ()=>{
      const name = document.getElementById('f-cname').value.trim();
      if(!name){ toast('Preenche o nome da empresa'); return; }
      state.settings.company = {name, nif:document.getElementById('f-cnif').value.trim(), logo:pendingLogo};
      logActivity('Informações da empresa atualizadas');
      saveState(); closeModal(); renderAll(); toast('Informações da empresa guardadas');
    };
  }

  if(type==='custofixo'){
    title.textContent = 'Novo custo fixo mensal';
    body.innerHTML = `
      <div class="field"><label>Nome</label><input id="f-cfname" placeholder="Ex: Renda do escritório, Software, Seguro..."></div>
      <div class="field"><label>Categoria</label><select id="f-cfcat">${EXPENSE_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select>
        <div id="f-cfcat-outro-wrap" style="display:none;margin-top:8px;"><input id="f-cfcat-outro" placeholder="Especifica a categoria"></div>
      </div>
      <div class="field"><label>Associar a</label><select id="f-cfclient"><option value="">Empresa (custo geral)</option>${CLIENT_NAMES().map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Valor mensal (€)</label><input id="f-cfvalue" type="number" placeholder="0"></div>
      <div class="field"><label>Dia de pagamento (1–31)</label><input id="f-cfday" type="number" min="1" max="31" placeholder="Ex: 8"></div>
      <div style="font-size:11px;color:var(--muted);">Vais receber um alerta 3 dias antes da data de pagamento, todos os meses. Este custo só passa a contar nas contas a partir do mês seguinte à criação. Se associares a um cliente, este custo passa a contar na rentabilidade desse cliente em Gestão Clientes.</div>`;
    document.getElementById('f-cfcat').addEventListener('change', ()=>{
      document.getElementById('f-cfcat-outro-wrap').style.display = document.getElementById('f-cfcat').value==='Outro' ? 'block' : 'none';
    });
    submit.onclick = ()=>{
      const name=document.getElementById('f-cfname').value.trim();
      const value=parseFloat(document.getElementById('f-cfvalue').value);
      const day=parseInt(document.getElementById('f-cfday').value,10);
      const catSel = document.getElementById('f-cfcat').value;
      const category = catSel==='Outro' ? (document.getElementById('f-cfcat-outro').value.trim()||'Outro') : catSel;
      const client = document.getElementById('f-cfclient').value || '';
      if(!name||!value){ toast('Preenche o nome e o valor'); return; }
      if(!day||day<1||day>31){ toast('Indica um dia de pagamento válido (1–31)'); return; }
      state.fixedCosts.unshift({id:uid('fc'),name,category:category||'Geral',client,value,dueDay:day,active:true,paidMonths:{},startMonthKey:nextMonthKey()});
      logActivity('Novo custo fixo: '+name+' ('+value+'€/mês, dia '+day+')'+(client?' — '+client:'')+' — começa em '+monthKeyLabel(nextMonthKey()));
      saveState();
      checkFixedCostAlerts();
      closeModal(); goToView('financeiro'); setFinTab('custos'); toast('Custo fixo adicionado');
    };
  }

  if(type==='editar-custofixo'){
    const c = state.fixedCosts.find(x=>x.id===clientId);
    if(!c){ closeModal(); return; }
    title.textContent = 'Editar custo fixo';
    body.innerHTML = `
      <div class="field"><label>Nome</label><input id="f-ecfname" value="${c.name||''}"></div>
      <div class="field"><label>Categoria</label><select id="f-ecfcat">${EXPENSE_CATEGORIES.map(cat=>`<option ${cat===c.category?'selected':''}>${cat}</option>`).join('')}</select>
        <div id="f-ecfcat-outro-wrap" style="margin-top:8px;${EXPENSE_CATEGORIES.includes(c.category)?'display:none;':''}"><input id="f-ecfcat-outro" placeholder="Especifica a categoria" value="${EXPENSE_CATEGORIES.includes(c.category)?'':(c.category||'')}"></div>
      </div>
      <div class="field"><label>Associar a</label><select id="f-ecfclient"><option value="" ${!c.client?'selected':''}>Empresa (custo geral)</option>${CLIENT_NAMES().map(n=>`<option ${c.client===n?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Valor mensal (€)</label><input id="f-ecfvalue" type="number" value="${c.value}"></div>
      <div class="field"><label>Dia de pagamento (1–31)</label><input id="f-ecfday" type="number" min="1" max="31" value="${c.dueDay}"></div>
      <div class="field"><label>Estado</label><select id="f-ecfactive">
        <option value="1" ${c.active?'selected':''}>Ativo</option>
        <option value="0" ${!c.active?'selected':''}>Pausado</option>
      </select></div>`;
    document.getElementById('f-ecfcat').addEventListener('change', ()=>{
      document.getElementById('f-ecfcat-outro-wrap').style.display = document.getElementById('f-ecfcat').value==='Outro' ? 'block' : 'none';
    });
    submit.onclick = ()=>{
      const name=document.getElementById('f-ecfname').value.trim();
      const value=parseFloat(document.getElementById('f-ecfvalue').value);
      const day=parseInt(document.getElementById('f-ecfday').value,10);
      const catSel = document.getElementById('f-ecfcat').value;
      const category = catSel==='Outro' ? (document.getElementById('f-ecfcat-outro').value.trim()||'Outro') : catSel;
      const client = document.getElementById('f-ecfclient').value || '';
      if(!name||!value){ toast('Preenche o nome e o valor'); return; }
      if(!day||day<1||day>31){ toast('Indica um dia de pagamento válido (1–31)'); return; }
      c.name = name; c.category = category||'Geral'; c.client = client; c.value = value; c.dueDay = day;
      c.active = document.getElementById('f-ecfactive').value==='1';
      logActivity('Custo fixo editado: '+name);
      saveState();
      checkFixedCostAlerts();
      closeModal(); goToView('financeiro'); setFinTab('custos'); toast('Custo fixo atualizado');
    };
  }
  if(type==='mensalidade'){
    title.textContent = 'Nova mensalidade';
    body.innerHTML = `
      <div class="field"><label>Cliente</label><select id="f-mrclient"><option value="">Sem cliente associado</option>${CLIENT_NAMES().map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Descrição</label><input id="f-mrname" placeholder="Ex: Manutenção mensal do site"></div>
      <div class="field"><label>Categoria</label><select id="f-mrcat">${REVENUE_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select>
        <div id="f-mrcat-outro-wrap" style="display:none;margin-top:8px;"><input id="f-mrcat-outro" placeholder="Especifica a categoria"></div>
      </div>
      <div class="field"><label>Valor mensal (€)</label><input id="f-mrvalue" type="number" placeholder="0"></div>
      <div class="field"><label>Dia de vencimento (1–31)</label><input id="f-mrday" type="number" min="1" max="31" placeholder="Ex: 8"></div>
      <div style="font-size:11px;color:var(--muted);">Vais receber um alerta 3 dias antes da data de vencimento, todos os meses. Esta mensalidade só passa a contar nas receitas e no IVA a partir do mês seguinte à criação, e só depois de confirmares "já recebido" em cada mês.</div>`;
    document.getElementById('f-mrcat').addEventListener('change', ()=>{
      document.getElementById('f-mrcat-outro-wrap').style.display = document.getElementById('f-mrcat').value==='Outro' ? 'block' : 'none';
    });
    submit.onclick = ()=>{
      const name=document.getElementById('f-mrname').value.trim();
      const value=parseFloat(document.getElementById('f-mrvalue').value);
      const day=parseInt(document.getElementById('f-mrday').value,10);
      const catSel = document.getElementById('f-mrcat').value;
      const category = catSel==='Outro' ? (document.getElementById('f-mrcat-outro').value.trim()||'Outro') : catSel;
      const client = document.getElementById('f-mrclient').value || '';
      if(!name||!value){ toast('Preenche a descrição e o valor'); return; }
      if(!day||day<1||day>31){ toast('Indica um dia de vencimento válido (1–31)'); return; }
      state.recurringRevenues.unshift({id:uid('mr'),name,category:category||'Geral',client,value,dueDay:day,active:true,paidMonths:{},startMonthKey:nextMonthKey()});
      logActivity('Nova mensalidade: '+name+' ('+value+'€/mês, dia '+day+')'+(client?' — '+client:'')+' — começa em '+monthKeyLabel(nextMonthKey()));
      saveState();
      checkRecurringRevenueAlerts();
      closeModal(); goToView('financeiro'); setFinTab('mensalidades'); toast('Mensalidade adicionada');
    };
  }

  if(type==='editar-mensalidade'){
    const c = state.recurringRevenues.find(x=>x.id===clientId);
    if(!c){ closeModal(); return; }
    title.textContent = 'Editar mensalidade';
    body.innerHTML = `
      <div class="field"><label>Cliente</label><select id="f-emrclient"><option value="" ${!c.client?'selected':''}>Sem cliente associado</option>${CLIENT_NAMES().map(n=>`<option ${c.client===n?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Descrição</label><input id="f-emrname" value="${c.name||''}"></div>
      <div class="field"><label>Categoria</label><select id="f-emrcat">${REVENUE_CATEGORIES.map(cat=>`<option ${cat===c.category?'selected':''}>${cat}</option>`).join('')}</select>
        <div id="f-emrcat-outro-wrap" style="margin-top:8px;${REVENUE_CATEGORIES.includes(c.category)?'display:none;':''}"><input id="f-emrcat-outro" placeholder="Especifica a categoria" value="${REVENUE_CATEGORIES.includes(c.category)?'':(c.category||'')}"></div>
      </div>
      <div class="field"><label>Valor mensal (€)</label><input id="f-emrvalue" type="number" value="${c.value}"></div>
      <div class="field"><label>Dia de vencimento (1–31)</label><input id="f-emrday" type="number" min="1" max="31" value="${c.dueDay}"></div>
      <div class="field"><label>Estado</label><select id="f-emractive">
        <option value="1" ${c.active?'selected':''}>Ativa</option>
        <option value="0" ${!c.active?'selected':''}>Pausada</option>
      </select></div>`;
    document.getElementById('f-emrcat').addEventListener('change', ()=>{
      document.getElementById('f-emrcat-outro-wrap').style.display = document.getElementById('f-emrcat').value==='Outro' ? 'block' : 'none';
    });
    submit.onclick = ()=>{
      const name=document.getElementById('f-emrname').value.trim();
      const value=parseFloat(document.getElementById('f-emrvalue').value);
      const day=parseInt(document.getElementById('f-emrday').value,10);
      const catSel = document.getElementById('f-emrcat').value;
      const category = catSel==='Outro' ? (document.getElementById('f-emrcat-outro').value.trim()||'Outro') : catSel;
      const client = document.getElementById('f-emrclient').value || '';
      if(!name||!value){ toast('Preenche a descrição e o valor'); return; }
      if(!day||day<1||day>31){ toast('Indica um dia de vencimento válido (1–31)'); return; }
      c.name = name; c.category = category||'Geral'; c.client = client; c.value = value; c.dueDay = day;
      c.active = document.getElementById('f-emractive').value==='1';
      logActivity('Mensalidade editada: '+name);
      saveState();
      checkRecurringRevenueAlerts();
      closeModal(); goToView('financeiro'); setFinTab('mensalidades'); toast('Mensalidade atualizada');
    };
  }
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click',(e)=>{ if(e.target.id==='modalOverlay') closeModal(); });
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeModal(); });

/* ---------------- RENDER ALL ---------------- */
function refreshFinancialViews(){
  renderNav();
  renderDashboard();
  renderFinanceiro();
  renderClientes();
  renderGestaoClientes();
  renderAnalise();
}

function renderAll(){
  renderBrand();
  renderNav();
  renderNotif();
  renderDashboard();
  renderFinanceiro();
  renderClientes();
  renderTrabalho();
  renderGestaoClientes();
  renderAnalise();
  renderDefinicoes();
}
checkFixedCostAlerts();
checkRecurringRevenueAlerts();
goToView(state.currentView);
</script>
</body>
</html>
